<div class="container">

    <h1>{{title}}</h1>

    <div class="form-box">

        <input type="text"
        #name
        placeholder="Enter Your Name"
        name="Name">

        <input type="text"
        #address
        placeholder="Enter Your Address"
        name="Address">

        <input type="text"
        #contact
        placeholder="Enter Your Contact Number"
        name="Contact">

        <input type="text"
        #email
        placeholder="Enter Your Email"
        name="Email">

        <input type="password"
        #password
        placeholder="Enter Your Password"
        name="Password">

        <button
        (click)="getValue(name.value, address.value, contact.value, email.value)">
            Register
        </button>

    </div>

    <div class="data-box">

        <h2>Your Registered Data</h2>

        <p><b>Name:</b> {{displayname}}</p>

        <p><b>Address:</b> {{displayaddress}}</p>

        <p><b>Contact:</b> {{displaycontact}}</p>

        <p><b>Email:</b> {{displayemail}}</p>

    </div>

</div>
